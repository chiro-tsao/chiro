<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <script>
    (function () {
      var path = window.location.pathname;
      var prefix = path.startsWith('/chiro/') || path === '/chiro' ? '/chiro' : '';
      var targetPath = prefix ? path : path;
      if (targetPath === '/' || targetPath === '' || targetPath === '/index.html') return;
      sessionStorage.redirect = targetPath + window.location.search;
      window.location.replace(prefix + '/index.html');
    })();
  </script>
</head>
</html>
