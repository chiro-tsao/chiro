<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <script>
    (function () {
      var path = window.location.pathname;
      if (path === '/' || path === '') return;
      var hash = '#!' + path;
      window.location.replace(window.location.origin + '/' + hash);
    })();
  </script>
</head>
</html>
